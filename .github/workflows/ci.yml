name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: install workloads
        run: |
          dotnet workload install wasm-tools
          dotnet workload install android

      - name: restore
        run: dotnet restore

      - name: build (all targets)
        run: dotnet build -c Release /p:TreatWarningsAsErrors=true --no-restore

      - name: publish wasm
        run: >
          dotnet publish LabsMediaPlayer/LabsMediaPlayer.csproj
          -c Release -f net9.0-browserwasm
          -o artifacts/wasm /p:TreatWarningsAsErrors=true

      - uses: actions/upload-artifact@v4
        with:
          name: wasm
          path: artifacts/wasm
          if-no-files-found: error
          retention-days: 14

      # Self-contained win-x64 so the EXE runs without a separate .NET Desktop Runtime install (framework-dependent zips often "do nothing" on click).
      - name: publish desktop self-contained (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          dotnet publish LabsMediaPlayer/LabsMediaPlayer.csproj
          -c Release -f net9.0-desktop
          -r win-x64 -p:SelfContained=true
          -p:TargetFrameworks=net9.0-desktop
          -o publish/desktop
          /p:TreatWarningsAsErrors=true

      - name: zip desktop portable (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: Compress-Archive -Path publish/desktop/* -DestinationPath labs-media-player-win-x64-self-contained.zip -Force

      - name: install Inno Setup (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: choco install innosetup --no-progress -y

      - name: build Windows installer (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "${{ github.workspace }}\installer\LabsMediaPlayer.iss"
          if (-not (Test-Path "artifacts/installer/labs-media-player-win-x64-setup.exe")) { throw "Inno did not produce setup.exe" }

      - name: publish android (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: >
          dotnet publish LabsMediaPlayer/LabsMediaPlayer.csproj
          -c Release -f net9.0-android
          -o publish/android
          /p:TreatWarningsAsErrors=true

      - name: stage apk (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path publish/android -Filter *.apk -Recurse | Select-Object -First 1
          if (-not $apk) { throw "No APK produced under publish/android" }
          Copy-Item $apk.FullName -Destination labs-media-player-net9.0-android.apk -Force

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: desktop-windows
          path: |
            labs-media-player-win-x64-self-contained.zip
            artifacts/installer/labs-media-player-win-x64-setup.exe
          if-no-files-found: error
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          name: android-apk
          path: labs-media-player-net9.0-android.apk
          if-no-files-found: error
          retention-days: 30

      - name: upsert continuous release (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view continuous --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create continuous \
              --repo "${GITHUB_REPOSITORY}" \
              --prerelease \
              --title "Continuous (main)" \
              --notes "Windows: **installer** (\`labs-media-player-win-x64-setup.exe\`, recommended) or portable **self-contained** zip (\`labs-media-player-win-x64-self-contained.zip\` — no separate .NET runtime). Android: \`labs-media-player-net9.0-android.apk\`. Refreshed on each green \`main\` build." \
              --target "${GITHUB_SHA}"
          fi
          gh release upload continuous \
            labs-media-player-win-x64-self-contained.zip \
            artifacts/installer/labs-media-player-win-x64-setup.exe \
            labs-media-player-net9.0-android.apk \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
